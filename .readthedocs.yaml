# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

sphinx:
  configuration: docs/conf.py

# Install the package plus its docs extra so autodoc/automodapi can import
# skycam_utils and sphinx-astropy is available.
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

formats: []
